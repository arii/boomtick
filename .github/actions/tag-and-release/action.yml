name: 'Tag and Release'
description: 'Checks version and creates a tag and GitHub Release if needed'
inputs:
  github_token:
    description: 'GitHub token for creating a release'
    required: true
outputs:
  should_release:
    description: 'Whether a release should proceed'
    value: ${{ steps.check_version.outputs.should_release }}
runs:
  using: "composite"
  steps:
    - name: Check version and tag status
      id: check_version
      shell: bash
      env:
        GITHUB_REF_ENV: ${{ github.ref }}
      run: |
        set -eo pipefail
        CURRENT_VERSION=$(node -p "const fs = require('fs'); const file = fs.existsSync('./package.json') ? './package.json' : './mcp/package.json'; require(file).version")
        export CURRENT_VERSION
        TAG_NAME="v${CURRENT_VERSION}"
        export TAG_NAME

        # Fetch tags to check existence
        git fetch --tags

        if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
          echo "Tag ${TAG_NAME} already exists."
          if [[ "${GITHUB_REF_ENV}" == refs/tags/* ]]; then
            echo "Triggered directly by tag. Proceeding."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version has not changed or tag already exists. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "Tag ${TAG_NAME} does not exist. Proceeding with new release."
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "create_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
        fi

    - name: Create Git Tag and GitHub Release
      if: steps.check_version.outputs.should_release == 'true' && steps.check_version.outputs.create_tag == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        TAG_NAME: ${{ steps.check_version.outputs.tag_name }}
        VERSION: ${{ steps.check_version.outputs.version }}
      run: |
        set -eo pipefail
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git tag "${TAG_NAME}"
        git push origin "${TAG_NAME}"
        gh release create "${TAG_NAME}" --title "chore: release ${TAG_NAME}" --generate-notes
