name: 'ChatOps Trigger'
description: 'Parses PR/Issue comments and dispatches actions accordingly'
inputs:
  comment_body:
    description: 'The body of the comment'
    required: true
    default: ${{ github.event.comment.body }}
  author_association:
    description: 'The author association of the comment creator'
    required: true
    default: ${{ github.event.comment.author_association }}
  issue_number:
    description: 'The issue or PR number'
    required: true
    default: ${{ github.event.issue.number }}
  github_token:
    description: 'The GitHub token'
    required: true
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Setup Workspace
      uses: ${{ github.action_path }}/../setup-workspace # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag

    - name: Pre-flight Validations
      id: validate
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        COMMENT_BODY: ${{ inputs.comment_body }}
        AUTHOR_ASSOC: ${{ inputs.author_association }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
      run: |
        if [ -z "$GH_TOKEN" ]; then
          echo "::error::github_token is missing."
          exit 1
        fi
        if [ -z "$COMMENT_BODY" ]; then
          echo "::error::comment_body is missing."
          exit 1
        fi
        if [[ ! "$AUTHOR_ASSOC" =~ ^(COLLABORATOR|CONTRIBUTOR|FIRST_TIMER|FIRST_TIME_CONTRIBUTOR|MANNEQUIN|MEMBER|NONE|OWNER)$ ]]; then
          echo "::error::Invalid author association format."
          exit 1
        fi
        if [[ ! "$ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
          echo "::error::Invalid issue_number: must be numeric."
          exit 1
        fi

        {
          EOF_COMMENT=$(openssl rand -hex 16)
          echo "COMMENT_BODY<<$EOF_COMMENT"
          printf "%s\n" "$COMMENT_BODY"
          echo "$EOF_COMMENT"
        } >> "$GITHUB_ENV"
      shell: bash

    - name: Check commands
      id: check
      env:
        AUTHOR_ASSOC: ${{ inputs.author_association }}
      run: |
        RESULT=$(td-cli gh parse-comment --author-association "$AUTHOR_ASSOC")
        {
          echo "conflict_resolve=$(echo "$RESULT" | jq -r '.actions.conflict_resolve')"
          echo "update_snapshots=$(echo "$RESULT" | jq -r '.actions.update_snapshots')"
          echo "ai_chatops=$(echo "$RESULT" | jq -r '.actions.ai_chatops')"
          echo "jules_fix_ci=$(echo "$RESULT" | jq -r '.actions.jules_fix_ci')"
        } >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Resolve Branch Details
      if: steps.check.outputs.conflict_resolve == 'true' || steps.check.outputs.update_snapshots == 'true' || steps.check.outputs.ai_chatops == 'true' || steps.check.outputs.jules_fix_ci == 'true'
      id: resolve_branch
      env:
        ISSUE_NUMBER: ${{ inputs.issue_number }}
      run: |
        PR_JSON=$(gh pr view "$ISSUE_NUMBER" --json headRefName,baseRefName || echo '{}')
        {
          echo "HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName // empty')"
          echo "BASE_REF=$(echo "$PR_JSON" | jq -r '.baseRefName // "main"')"
        } >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Trigger Dispatch Actions
      if: steps.check.outputs.conflict_resolve == 'true' || steps.check.outputs.update_snapshots == 'true' || steps.check.outputs.ai_chatops == 'true' || steps.check.outputs.jules_fix_ci == 'true'
      env:
        HEAD_REF: ${{ steps.resolve_branch.outputs.HEAD_REF }}
        BASE_REF: ${{ steps.resolve_branch.outputs.BASE_REF }}
        CONFLICT_RESOLVE: ${{ steps.check.outputs.conflict_resolve }}
        UPDATE_SNAPSHOTS: ${{ steps.check.outputs.update_snapshots }}
        AI_CHATOPS: ${{ steps.check.outputs.ai_chatops }}
        JULES_FIX_CI: ${{ steps.check.outputs.jules_fix_ci }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        ERRORS=0
        OPS_WORKFLOW="issue-operations.yml"
        CI_WORKFLOW="ci-repair.yml"

        declare -A ACTIONS
        [[ "$CONFLICT_RESOLVE" == 'true' ]] && ACTIONS["resolve-conflicts"]="$OPS_WORKFLOW|$HEAD_REF"
        [[ "$UPDATE_SNAPSHOTS" == 'true' ]] && ACTIONS["update-snapshots"]="$OPS_WORKFLOW|$HEAD_REF"
        [[ "$AI_CHATOPS" == 'true' ]]      && ACTIONS["ai-review"]="$OPS_WORKFLOW|$HEAD_REF"
        [[ "$JULES_FIX_CI" == 'true' ]]    && ACTIONS["jules-fix-ci"]="$CI_WORKFLOW|$BASE_REF"

        for action in "${!ACTIONS[@]}"; do
          IFS='|' read -r workflow ref <<< "${ACTIONS[$action]}"
          if [[ "$action" == "jules-fix-ci" ]]; then
            if ! gh workflow run "$workflow" --ref "$ref" -f issue_number="$ISSUE_NUMBER" -f comment_body="$COMMENT_BODY"; then
              echo "::error::Failed to trigger $workflow for $action on ref $ref (Issue: $ISSUE_NUMBER)."
              ERRORS=1
            fi
          else
            if ! gh workflow run "$workflow" --ref "$ref" -f action="$action" -f issue_number="$ISSUE_NUMBER" -f comment_body="$COMMENT_BODY"; then
              echo "::error::Failed to trigger $workflow for $action on ref $ref (Issue: $ISSUE_NUMBER)."
              ERRORS=1
            fi
          fi
        done

        if [ "$ERRORS" -ne 0 ]; then
          bash -c 'exit 1'
        fi
      shell: bash
