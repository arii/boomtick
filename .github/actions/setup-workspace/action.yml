name: 'Setup Workspace'
description: 'Bootstraps the workspace by installing Node.js, Python, and dev-tools'
inputs:
  setup-node:
    description: "Install Node.js and pnpm"
    required: false
    default: 'true'
  setup-python:
    description: "Install dev-tools (Python)"
    required: false
    default: 'true'
  node-version-file:
    description: "Path to .node-version file"
    required: false
    default: ".node-version"
  pnpm-version:
    description: "Version of pnpm to activate"
    required: false
    default: "10.28.2"

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      if: inputs.setup-node == 'true'
      uses: pnpm/action-setup@v6 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Get pnpm store directory
      if: inputs.setup-node == 'true'
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      if: inputs.setup-node == 'true'
      uses: actions/cache@v4.2.0 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Setup Node.js
      if: inputs.setup-node == 'true'
      uses: actions/setup-node@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Enable Corepack
      if: inputs.setup-node == 'true'
      run: corepack enable
      shell: bash

    - name: Activate pinned pnpm
      if: inputs.setup-node == 'true'
      env:
        PNPM_VERSION: ${{ inputs.pnpm-version }}
      run: corepack prepare pnpm@"$PNPM_VERSION" --activate
      shell: bash

    - name: Resolve Paths
      id: resolve-paths
      shell: bash
      run: |
        # Use centralized script for CLI path resolution
        if [ -f "scripts/resolve-cli.sh" ]; then
          CLI_DIR=$(bash scripts/resolve-cli.sh | sed "s|$(pwd)/||")
        else
          CLI_DIR="cli"
        fi
        echo "CLI_DIR=$CLI_DIR" >> "$GITHUB_OUTPUT"

        # Consolidate GITHUB_PATH updates
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "/github/home/.local/bin" >> "$GITHUB_PATH"

    - name: Get pip cache directory
      if: inputs.setup-python == 'true'
      id: pip-cache
      shell: bash
      run: |
        echo "DIR=$(pip cache dir)" >> "$GITHUB_OUTPUT"

    - name: Cache pip
      if: inputs.setup-python == 'true'
      uses: actions/cache@v4.2.0 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
      with:
        path: ${{ steps.pip-cache.outputs.DIR }}
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dev-tools
      if: inputs.setup-python == 'true'
      env:
        CLI_DIR: ${{ steps.resolve-paths.outputs.CLI_DIR }}
      run: |
        echo "::group::Install dev-tools"
        if [ -f "requirements-dev.txt" ]; then
          pip install -r requirements-dev.txt --break-system-packages
        fi
        if [ -f "$CLI_DIR/requirements-dev.txt" ]; then
          pip install -r "$CLI_DIR/requirements-dev.txt" --break-system-packages
        fi
        if [ -f "$CLI_DIR/requirements-ai.txt" ]; then
          pip install -r "$CLI_DIR/requirements-ai.txt" --break-system-packages
        fi
        pip install -e "$CLI_DIR" --break-system-packages

        echo "::endgroup::"
      shell: bash

    - name: Verify td-cli on PATH
      if: inputs.setup-python == 'true'
      run: |
        # Force a refresh of the path in the current shell context if possible,
        # though GITHUB_PATH updates usually apply to subsequent steps.
        export PATH="$HOME/.local/bin:/github/home/.local/bin:$PATH"

        if ! command -v td-cli >/dev/null 2>&1; then
          # Fallback check if it is in the known local bin but not on path yet
          if [ -x "$HOME/.local/bin/td-cli" ] || [ -x "/github/home/.local/bin/td-cli" ]; then
            echo "::warning::td-cli found in local bin but not yet on PATH. PATH updates will apply in next step."
          else
            echo "::error::td-cli not found on PATH or in known local bin directories after installation."
            echo "Current PATH: $PATH"
            exit 1
          fi
        fi
        echo "✅ td-cli is resolvable on PATH (or confirmed available in local bin)."
      shell: bash

    - name: Export Environment Variables
      if: inputs.setup-python == 'true'
      id: export-env
      env:
        CLI_DIR: ${{ steps.resolve-paths.outputs.CLI_DIR }}
      run: |
        # Use $(pwd) to get the container-internal path, avoiding host-path leakage from $GITHUB_WORKSPACE
        REPO_DIR=$(pwd)
        CLI_DIR_ABS="$REPO_DIR/$CLI_DIR"

        # 1. Update PYTHONPATH for subsequent steps
        # Ensure it works even if PYTHONPATH is initially empty
        if [ -z "$PYTHONPATH" ]; then
          echo "PYTHONPATH=$CLI_DIR_ABS" >> "$GITHUB_ENV"
        else
          echo "PYTHONPATH=$CLI_DIR_ABS:$PYTHONPATH" >> "$GITHUB_ENV"
        fi
        echo "cli_dir_abs=$CLI_DIR_ABS" >> "$GITHUB_OUTPUT"

        echo "✅ Environment configured: PYTHONPATH includes $CLI_DIR_ABS"
      shell: bash

    - name: Initialize Schemas and Contracts
      if: inputs.setup-node == 'true' && inputs.setup-python == 'true'
      env:
        CLI_DIR_ABS: ${{ steps.export-env.outputs.cli_dir_abs }}
      run: |
        echo "::group::Initialize Schemas and Contracts"
        export PYTHONPATH="$CLI_DIR_ABS:$PYTHONPATH"
        python3 "$CLI_DIR_ABS/dev_tools/schema_gen.py"
        # Only run sync-contracts if node_modules exist, otherwise skip and let caller build pipeline handle it
        if [ -d "node_modules" ] || [ -d "mcp/node_modules" ]; then
          pnpm --filter @arii/boomtick-mcp run sync-contracts
        else
          echo "⚠️ node_modules missing, skipping sync-contracts. Run pnpm install and sync-contracts in caller workflow."
        fi
        echo "::endgroup::"
      shell: bash
