name: "Setup Workspace"
description: "Common setup steps for all CI jobs"
inputs:
  node-version-file:
    description: "Path to .node-version file"
    required: false
    default: ".node-version"
  setup-node:
    description: "Whether to setup Node.js and pnpm"
    required: false
    default: "true"
  setup-python:
    description: "Whether to setup Python and pip"
    required: false
    default: "true"
  setup-playwright:
    description: "Whether to setup Playwright browsers"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      if: inputs.setup-node == 'true'
      uses: pnpm/action-setup@v4
      with:
        version: "10.28.2"

    - name: Get pnpm store directory
      if: inputs.setup-node == 'true'
      shell: bash
      id: pnpm-cache
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      if: inputs.setup-node == 'true'
      uses: actions/cache@v4 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Setup Node.js
      if: inputs.setup-node == 'true'
      uses: actions/setup-node@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Install Node dependencies
      if: inputs.setup-node == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline

    - name: Setup Playwright cache
      if: inputs.setup-playwright == 'true'
      uses: actions/cache@v4 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/package.json') }}

    - name: Install Playwright Browsers
      if: inputs.setup-playwright == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: pnpm exec playwright install --with-deps chromium

    - name: Setup Python
      if: inputs.setup-python == 'true'
      uses: actions/setup-python@v6 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
      with:
        python-version: "3.12"

    - name: Ensure setuptools is not installed
      if: inputs.setup-python == 'true'
      shell: bash
      run: |
        pip uninstall -y setuptools || true

    - name: Get pip cache directory
      if: inputs.setup-python == 'true'
      id: pip-cache
      shell: bash
      run: |
        echo "DIR=$(pip cache dir)" >> "$GITHUB_OUTPUT"

    - name: Cache pip
      if: inputs.setup-python == 'true'
      uses: actions/cache@v4 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
      with:
        path: ${{ steps.pip-cache.outputs.DIR }}
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      if: inputs.setup-python == 'true'
      shell: bash
      run: |
        if [ -f cli/requirements-dev.txt ]; then
          pip install --root-user-action=ignore -r cli/requirements-dev.txt
          pip install --root-user-action=ignore -e ./cli
        fi
