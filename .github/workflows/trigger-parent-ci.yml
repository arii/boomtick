name: Trigger Parent CI

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Boomtick branch to test'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  trigger-parent-ci:
    name: Trigger Tech-Dancer CI
    runs-on: ubuntu-latest
    env:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
    steps:
      - name: Generate Token
        id: generate_token
        if: ${{ env.APP_ID != '' && env.APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Determine branch name
        id: get-branch
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          INPUT_BRANCH: ${{ github.event.inputs.branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BRANCH="$PR_HEAD_REF"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            BRANCH="$INPUT_BRANCH"
            if [ -z "$BRANCH" ]; then
              BRANCH="$REF_NAME"
            fi
          else
            BRANCH="$REF_NAME"
          fi

          # Sanitize branch name to only allow safe characters (alphanumeric, slash, dot, underscore, dash)
          SANITIZED_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9/._-]//g')
          echo "branch=$SANITIZED_BRANCH" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Trigger update-submodule workflow in tech-dancer
        id: trigger_workflow
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          BRANCH_NAME: ${{ steps.get-branch.outputs.branch }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::GitHub App Token could not be generated. Cannot trigger downstream CI."
            echo "triggered=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Triggering tech-dancer update-submodule workflow with boomtick branch: $BRANCH_NAME"

          gh workflow run update-submodule.yml \
            --repo arii/tech-dancer \
            --ref main \
            -f ref="$BRANCH_NAME"

          echo "triggered=true" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Post PR Comment
        if: ${{ github.event_name == 'pull_request' && steps.trigger_workflow.outputs.triggered == 'true' }}
        uses: actions/github-script@v8 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH_NAME: ${{ steps.get-branch.outputs.branch }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const branchName = process.env.BRANCH_NAME;

            const commentTag = '<!-- downstream-ci-trigger-comment -->';
            const body = `### Downstream CI Triggered 🚀\n\n` +
              `A downstream submodule update Pull Request / CI pipeline has been automatically triggered in the parent repository (**tech-dancer**) to verify these changes against the parent codebase.\n\n` +
              `- **Target Submodule Branch**: \`${branchName}\`\n` +
              `- **Downstream Workflow**: [update-submodule.yml](https://github.com/arii/tech-dancer/actions/workflows/update-submodule.yml)\n\n` +
              `You can monitor the status of the submodule update and the integration tests directly on the [tech-dancer actions page](https://github.com/arii/tech-dancer/actions/workflows/update-submodule.yml).\n\n` +
              `${commentTag}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(c => c.body.includes(commentTag));

            if (existingComment) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existingComment.id, body });
            } else {
              await github.rest.issues.createComment({ issue_number: prNumber, owner, repo, body });
            }
