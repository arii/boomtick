name: Trigger Parent CI

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Boomtick branch to test'
        required: false
        type: string

permissions:
  contents: read

jobs:
  trigger-parent-ci:
    name: Trigger Tech-Dancer CI
    runs-on: ubuntu-latest
    env:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
    steps:
      - name: Generate Token
        id: generate_token
        if: ${{ env.APP_ID != '' && env.APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Determine branch name
        id: get-branch
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          INPUT_BRANCH: ${{ github.event.inputs.branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BRANCH="$PR_HEAD_REF"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            BRANCH="$INPUT_BRANCH"
            if [ -z "$BRANCH" ]; then
              BRANCH="$REF_NAME"
            fi
          else
            BRANCH="$REF_NAME"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Trigger update-submodule workflow in tech-dancer
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          BRANCH_NAME: ${{ steps.get-branch.outputs.branch }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::GitHub App Token could not be generated. Cannot trigger downstream CI."
            exit 0
          fi

          echo "Triggering tech-dancer update-submodule workflow with boomtick branch: $BRANCH_NAME"

          gh workflow run update-submodule.yml \
            --repo arii/tech-dancer \
            --ref main \
            -f ref="$BRANCH_NAME"
        shell: bash
