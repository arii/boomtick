name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'cli-v*'
      - 'mcp-v*'
      - 'action-v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to release'
        required: true
        type: choice
        options:
          - cli
          - mcp
          - action
          - all
        default: cli
      dry_run:
        description: 'Dry run'
        type: boolean
        default: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.generate_token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [cli, mcp, action, all]
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.target == matrix.target || (inputs.target == 'all' && matrix.target != 'all'))) ||
      (github.event_name == 'push' && startsWith(github.ref, format('refs/tags/{0}-v', matrix.target)))
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-all
        with:
          setup-python: 'true'

      - name: Publish Release
        uses: ./.github/actions/publish-release
        with:
          target: ${{ matrix.target }}
          dry_run: ${{ inputs.dry_run || false }}
          npm_token: ${{ secrets.NPM_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
