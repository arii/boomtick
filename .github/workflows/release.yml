name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'cli-v*'
      - 'mcp-v*'
      - 'action-v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to release'
        required: true
        type: choice
        options:
          - cli
          - mcp
          - action
          - all
        default: cli
      dry_run:
        description: 'Dry run'
        type: boolean
        default: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-cli:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cli-v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'cli')
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-all
        with:
          setup-python: 'true'

      - name: Publish CLI Release
        uses: ./.github/actions/publish-release
        with:
          target: cli
          dry_run: ${{ inputs.dry_run || false }}
          npm_token: ${{ secrets.NPM_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  release-mcp:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/mcp-v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'mcp')
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-all
        with:
          setup-python: 'true'

      - name: Publish MCP Release
        uses: ./.github/actions/publish-release
        with:
          target: mcp
          dry_run: ${{ inputs.dry_run || false }}
          npm_token: ${{ secrets.NPM_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  release-action:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/action-v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'action')
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-all
        with:
          setup-python: 'true'

      - name: Publish Action Release
        uses: ./.github/actions/publish-release
        with:
          target: action
          dry_run: ${{ inputs.dry_run || false }}
          npm_token: ${{ secrets.NPM_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  release-all:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'all'
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-all
        with:
          setup-python: 'true'

      - name: Publish All Release
        uses: ./.github/actions/publish-release
        with:
          target: all
          dry_run: ${{ inputs.dry_run || false }}
          npm_token: ${{ secrets.NPM_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
