name: Release boomtick-cli

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Whether to run a dry run (skip PyPI upload)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    uses: arii/boomtick/.github/workflows/release-logic.yml@main
    with:
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
