name: Release Orchestrator

on:
  push:
    tags:
      - 'cli-v*'
      - 'mcp-v*'
      - 'action-v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to release'
        required: true
        type: choice
        options:
          - cli
          - mcp
          - action
          - all
        default: cli
      dry_run:
        description: 'Dry run'
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Determine Release Target
        id: determine_target
        env:
          GITHUB_REF_VAL: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET: ${{ inputs.target }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          TARGET="$INPUT_TARGET"
          DRY_RUN="$INPUT_DRY_RUN"
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            DRY_RUN="false"
            if [[ "$GITHUB_REF_VAL" == refs/tags/cli-v* ]]; then
              TARGET="cli"
            elif [[ "$GITHUB_REF_VAL" == refs/tags/mcp-v* ]]; then
              TARGET="mcp"
            elif [[ "$GITHUB_REF_VAL" == refs/tags/action-v* ]]; then
              TARGET="action"
            fi
          fi
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "Target determined: $TARGET"
          echo "Dry run: $DRY_RUN"
        shell: bash

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-all
        with:
          setup-python: 'true'

      - name: Install Node Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run MCP Tests
        if: steps.determine_target.outputs.target == 'mcp' || steps.determine_target.outputs.target == 'all'
        run: pnpm --filter @arii/boomtick-mcp test

      - name: Run CLI Tests
        if: steps.determine_target.outputs.target == 'cli' || steps.determine_target.outputs.target == 'all'
        run: |
          cd cli
          pip install -e .
          pytest tests/

      - name: Build MCP Tool
        run: pnpm --filter @arii/boomtick-mcp build

      - name: Sync schemas/contracts
        run: pnpm run verify:schemas

      - name: Bundle MCP into CLI
        if: steps.determine_target.outputs.target == 'cli' || steps.determine_target.outputs.target == 'all'
        run: |
          mkdir -p cli/dev_tools/dist
          cp -r mcp/dist/* cli/dev_tools/dist/

      - name: Build Python Package
        if: steps.determine_target.outputs.target == 'cli' || steps.determine_target.outputs.target == 'all'
        run: |
          cd cli
          python3 -m build

      # [NOTE]: Temporarily disabling MCP publishing due to npm auth errors.
      # Actionlint forbids `if: false`, so this block is entirely commented out.
      # - name: Publish MCP to npm
      #   if: (steps.determine_target.outputs.target == 'mcp' || steps.determine_target.outputs.target == 'all') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && steps.determine_target.outputs.dry_run == 'false'))
      #   run: pnpm --filter @arii/boomtick-mcp publish --no-git-checks --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI to PyPI
        if: (steps.determine_target.outputs.target == 'cli' || steps.determine_target.outputs.target == 'all') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && steps.determine_target.outputs.dry_run == 'false'))
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=""
          if [ -d "cli/dist" ]; then ASSETS="cli/dist/*"; fi
          gh release create "${{ github.ref_name }}" --title "Release ${{ github.ref_name }}" --generate-notes "$ASSETS"

      - name: Log in to GitHub Container Registry
        if: (steps.determine_target.outputs.target == 'all' || steps.determine_target.outputs.target == 'cli') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && steps.determine_target.outputs.dry_run == 'false'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: (steps.determine_target.outputs.target == 'all' || steps.determine_target.outputs.target == 'cli') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && steps.determine_target.outputs.dry_run == 'false'))
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        if: (steps.determine_target.outputs.target == 'all' || steps.determine_target.outputs.target == 'cli') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && steps.determine_target.outputs.dry_run == 'false'))
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Floating Major Tag
        # Specifically for 'action' target, we maintain floating major version tags (e.g. action-v1)
        # to allow consumers to track stable major versions of the composite action.
        if: steps.determine_target.outputs.target == 'action' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/action-v')
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME=${GITHUB_REF_NAME}
          MAJOR_VERSION=$(echo "$TAG_NAME" | cut -d. -f1)
          echo "Updating floating tag $MAJOR_VERSION to $TAG_NAME"
          git tag -fa "$MAJOR_VERSION" -m "Update floating tag $MAJOR_VERSION to $TAG_NAME"
          git push origin "$MAJOR_VERSION" --force
