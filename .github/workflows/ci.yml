name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pull-requests: write
  models: read
  issues: write
  actions: read

jobs:
  workflow-lint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check workflow files with actionlint
        run: |
          # Download and install actionlint
          curl -sLS https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          ./actionlint -ignore "constant expression .* in condition" -ignore "unknown Webhook event \"dependabot_alert\"" .github/workflows/*.yml

  lint-typecheck:
    name: Lint & Typecheck (${{ matrix.target }})
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run'
    strategy:
      fail-fast: false
      matrix:
        target: [typescript, python]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace

      - name: Run Lint & Typecheck (TypeScript)
        if: matrix.target == 'typescript'
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @arii/boomtick-mcp run lint
          pnpm --filter @arii/boomtick-mcp run type-check

      - name: Run Lint & Typecheck (Python)
        if: matrix.target == 'python'
        run: |
          pnpm run lint:python
          pnpm run type-check:python

  audit:
    name: Anti-Pattern & Code Smell Checks
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Duplication Detection (jscpd)
        run: pnpm exec jscpd .

  test-build:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run MCP Tests (Vitest)
        run: pnpm --filter @arii/boomtick-mcp run test

      - name: Run Python CLI Tests (pytest)
        run: |
          PYTHONPATH="$PYTHONPATH:$(pwd)/cli"
          export PYTHONPATH
          python3 -m pytest cli/tests

  impact-analysis:
    name: Deployment Impact Analysis
    runs-on: ubuntu-latest
    needs: [workflow-lint, lint-typecheck, audit, test-build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Deployment Impact Analysis
        uses: ./mcp/actions/impact-analysis
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          pr_number: ${{ github.event.pull_request.number }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}

