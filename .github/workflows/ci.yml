name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number for manual fix'
        required: false
        type: string
      comment_body:
        description: 'Comment body'
        required: false
        type: string

permissions:
  contents: read
  packages: read
  pull-requests: write
  models: read
  issues: write
  actions: read

jobs:
  workflow-lint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' && !github.event.inputs.issue_number
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check workflow files with actionlint
        run: |
          # Download and install actionlint
          curl -sLS https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          ./actionlint .github/workflows/*.yml

  lint-typecheck:
    name: Lint & Typecheck (${{ matrix.target }})
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' && !github.event.inputs.issue_number
    strategy:
      fail-fast: false
      matrix:
        target: [typescript, python]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace

      - name: Run Lint & Typecheck (TypeScript)
        if: matrix.target == 'typescript'
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @arii/boomtick-mcp run lint
          pnpm --filter @arii/boomtick-mcp run type-check

      - name: Run Lint & Typecheck (Python)
        if: matrix.target == 'python'
        run: |
          # Use established .pylintrc if available
          python3 -m pylint cli --rcfile=.pylintrc
          python3 -m mypy cli --ignore-missing-imports || true

  audit:
    name: Anti-Pattern & Code Smell Checks
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' && !github.event.inputs.issue_number
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Duplication Detection (jscpd)
        run: pnpm exec jscpd .

  test-build:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' && !github.event.inputs.issue_number
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run MCP Tests (Vitest)
        run: pnpm --filter @arii/boomtick-mcp run test

      - name: Run Python CLI Tests (pytest)
        run: |
          PYTHONPATH="$PYTHONPATH:$(pwd)/cli"
          export PYTHONPATH
          python3 -m pytest cli/tests

  impact-analysis:
    name: Deployment Impact Analysis
    runs-on: ubuntu-latest
    needs: [workflow-lint, lint-typecheck, audit, test-build]
    if: github.event_name == 'pull_request' && !github.event.inputs.issue_number
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Deployment Impact Analysis
        uses: ./mcp/actions/impact-analysis
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          pr_number: ${{ github.event.pull_request.number }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}

  manual-jules-fix:
    name: Manual Jules Fix CI
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install PyGithub requests click

      - name: Pre-check Jules Credentials
        run: |
          MISSING=()
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then MISSING+=("GITHUB_TOKEN"); fi
          if [ -z "${{ secrets.JULES_API_KEY }}" ]; then MISSING+=("JULES_API_KEY"); fi

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "❌ Missing required secrets: ${MISSING[*]}"
            echo "Please ensure GITHUB_TOKEN and JULES_API_KEY are configured in repository secrets."
            exit 1
          fi

          if [ -z "${{ vars.JULES_SOURCE_ID }}" ]; then
            echo "⚠️ JULES_SOURCE_ID variable not found. Script will attempt auto-discovery."
          fi
          echo "✅ Credentials pre-check passed."

      - name: Setup Workspace
        uses: ./mcp/actions/setup-workspace
        with:
          setup-node: 'false'

      - name: Initialize Jules Repair Session
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          JULES_SOURCE_ID: ${{ vars.JULES_SOURCE_ID }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        run: |
          td-cli jules fix-ci --pr-number "$ISSUE_NUMBER" --execute
