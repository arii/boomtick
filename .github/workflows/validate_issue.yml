name: Validate Issue Quality

on:
  issues:
    types: [opened, edited]


jobs:
  validate:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/arii/tech-dancer:latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 1
      - name: Setup Workspace
        uses: ./mcp/actions/setup-workspace
        with:
          setup-node: 'false'

      - name: Validate Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          td-cli gh validate-issue --issue-number ${{ github.event.issue.number }} --post-comments --execute
