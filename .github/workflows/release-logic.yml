name: Release Logic

on:
  workflow_call:
    inputs:
      target:
        description: 'Target to release (cli, mcp, action, or all)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (skip publish)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        with:
          setup-python: ${{ inputs.target == 'cli' || inputs.target == 'all' && 'true' || 'false' }}

      - name: Run MCP Tests
        if: inputs.target == 'mcp' || inputs.target == 'all'
        run: pnpm --filter @arii/boomtick-mcp test

      - name: Run CLI Tests
        if: inputs.target == 'cli' || inputs.target == 'all'
        run: |
          cd cli
          pip install -e .
          pytest tests/

      - name: Build MCP Tool
        run: pnpm --filter @arii/boomtick-mcp build

      - name: Sync schemas/contracts
        run: pnpm run verify:schemas

      - name: Bundle MCP into CLI
        if: inputs.target == 'cli' || inputs.target == 'all'
        run: |
          mkdir -p cli/dev_tools/dist
          cp -r mcp/dist/* cli/dev_tools/dist/

      - name: Build Python Package
        if: inputs.target == 'cli' || inputs.target == 'all'
        run: |
          cd cli
          python3 -m build

      - name: Publish MCP to npm
        if: (inputs.target == 'mcp' || inputs.target == 'all') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false))
        run: pnpm --filter @arii/boomtick-mcp publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI to PyPI
        if: (inputs.target == 'cli' || inputs.target == 'all') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false))
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

      # NEW: Move the floating action tag (e.g., action-v1) to point to action-v1.x.x
      - name: Extract major version tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/action-v')
        id: major_tag
        run: |
          TAG_NAME="$GITHUB_REF_NAME"
          MAJOR_TAG=${TAG_NAME%%.*}
          echo "tag=$MAJOR_TAG" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Update Floating Action Tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/action-v')
        uses: actions-ecosystem/action-re-tag@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.major_tag.outputs.tag }}

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=""
          if [ -d "cli/dist" ]; then ASSETS="cli/dist/*"; fi
          gh release create "${{ github.ref_name }}" --title "Release ${{ github.ref_name }}" --generate-notes "$ASSETS"
