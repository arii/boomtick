name: Release Logic

on:
  workflow_call:
    inputs:
      dry_run:
        description: 'Whether to run a dry run (skip PyPI upload)'
        type: boolean
        default: true
    secrets:
      PYPI_API_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Whether to run a dry run (skip PyPI upload)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SUBPKG_PATH: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag

      - name: Setup Node.js
        uses: actions/setup-node@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          node-version-file: '${{ env.SUBPKG_PATH }}/.node-version'

      - name: Tag and Release
        id: check_version
        uses: ./.github/actions/tag-and-release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        if: steps.check_version.outputs.should_release == 'true'
        uses: actions/setup-python@v6 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pnpm
        if: steps.check_version.outputs.should_release == 'true'
        uses: pnpm/action-setup@v6 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          version: 10.28.2

      - name: Install dependencies
        if: steps.check_version.outputs.should_release == 'true'
        run: |
          set -eo pipefail
          pnpm install --frozen-lockfile
          pip install -r ${{ env.SUBPKG_PATH }}/cli/requirements.txt
          pip install build twine

      - name: Sync schemas/contracts
        if: steps.check_version.outputs.should_release == 'true'
        run: |
          set -eo pipefail
          PYTHONPATH="$PYTHONPATH:$(pwd)/${{ env.SUBPKG_PATH }}/cli"
          export PYTHONPATH
          python3 ${{ env.SUBPKG_PATH }}/cli/dev_tools/schema_gen.py
          pnpm exec tsx ${{ env.SUBPKG_PATH }}/mcp/scripts/sync-contracts.ts

      - name: Build TypeScript MCP
        if: steps.check_version.outputs.should_release == 'true'
        run: |
          set -eo pipefail
          pnpm --filter @boomtick/mcp build

      - name: Copy compiled JS
        if: steps.check_version.outputs.should_release == 'true'
        run: |
          set -eo pipefail
          mkdir -p ${{ env.SUBPKG_PATH }}/cli/dev_tools/dist
          cp -r ${{ env.SUBPKG_PATH }}/mcp/dist/* ${{ env.SUBPKG_PATH }}/cli/dev_tools/dist/

      - name: Build Python Package
        if: steps.check_version.outputs.should_release == 'true'
        run: |
          set -eo pipefail
          cd ${{ env.SUBPKG_PATH }}/cli
          python3 -m build

      - name: Publish to PyPI
        if: steps.check_version.outputs.should_release == 'true' && inputs.dry_run != true
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -eo pipefail
          twine upload ${{ env.SUBPKG_PATH }}/cli/dist/*

      - name: Dry Run Summary
        if: steps.check_version.outputs.should_release == 'true' && inputs.dry_run == true
        run: |
          echo "### Dry Run Complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "The release workflow completed successfully in dry-run mode." >> $GITHUB_STEP_SUMMARY
          echo "- Python package built in ${{ env.SUBPKG_PATH }}/cli/dist/" >> $GITHUB_STEP_SUMMARY
          echo "- PyPI upload skipped as requested." >> $GITHUB_STEP_SUMMARY
