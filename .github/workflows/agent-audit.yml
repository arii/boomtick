name: Agent Audit Dispatch

on:
  workflow_dispatch:
    inputs:
      audit_type:
        description: 'Type of Audit to run'
        required: true
        default: 'codebase-integrity-audit'
        type: choice
        options:
          - codebase-integrity-audit
          - issue-audit
          - review-ux
      # Controls whether the agent evaluation runs remotely via the Jules API
      # or directly on the GitHub Actions runner environment.
      execution_mode:
        description: 'Agent execution mode (remote-dispatch sends to Jules via GitHub API; local-orchestrator runs directly on runner)'
        required: true
        default: 'remote-dispatch'
        type: choice
        options:
          - remote-dispatch
          - local-orchestrator
      pr_number:
        description: 'Optional PR Number for local orchestration'
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  dispatch-agent:
    name: Dispatch Audit Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace

      - name: Resolve Audit Content
        if: ${{ inputs.execution_mode == 'remote-dispatch' }}
        id: resolve-content
        env:
          # Bound to env to prevent shell command injection from inputs
          AUDIT_TYPE: ${{ inputs.audit_type }}
        run: |
          # Read the selected agent workflow content
          if [ -f ".agents/workflows/${AUDIT_TYPE}.md" ]; then
            # We export the prompt to an environment variable to pass it to the CLI safely
            EOF_DELIMITER=$(openssl rand -hex 16)
            {
              echo "AUDIT_PROMPT<<$EOF_DELIMITER"
              cat ".agents/workflows/${AUDIT_TYPE}.md"
              echo "$EOF_DELIMITER"
            } >> "$GITHUB_ENV"
          else
            echo "Error: Audit template not found at .agents/workflows/${AUDIT_TYPE}.md. Please ensure the template file exists and the audit type is correctly spelled."
            # fail task without exiting
            false
          fi

      - name: Dispatch Jules Agent
        if: ${{ inputs.execution_mode == 'remote-dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          # Use td-cli to dispatch the task to jules targeting the main branch
          td-cli agent dispatch main "$AUDIT_PROMPT"

      - name: Run Local Orchestrator
        if: ${{ inputs.execution_mode == 'local-orchestrator' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number provided. Running local orchestrator for all open PRs..."
            td-cli agent run-local
          else
            # Validate input to prevent command injection
            if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
              echo "Error: PR number must be a valid integer."
              exit 1
            fi
            # Use sanitized value
            VALID_PR=$(echo "$PR_NUMBER" | grep -o -E '^[0-9]+$')
            echo "Running local orchestrator for PR #$VALID_PR..."
            td-cli agent run-local --pr "$VALID_PR"
          fi
