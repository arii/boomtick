name: Issue Operations

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - ai-review
          - resolve-conflicts
          - update-snapshots
      issue_number:
        description: 'Issue or PR number'
        required: true
        type: string
      comment_body:
        description: 'Comment body (optional)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  validate-quality:
    name: Validate Issue Quality
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/arii/tech-dancer:v2.0.1
    steps:
      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Issue Operations (Validate Quality)
        uses: ./.github/actions/issue-operations
        with:
          action: 'validate-quality'
          issue_number: ${{ github.event.issue.number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  create-pr:
    name: Issue to Content PR
    if: |
      github.event_name == 'issues' &&
      startsWith(github.event.issue.title, 'Draft') &&
      contains(github.event.issue.title, ':') &&
      (github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'MEMBER' ||
       github.event.issue.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Issue Operations (Create Content PR)
        uses: ./.github/actions/issue-operations
        with:
          action: 'create-pr'
          issue_number: ${{ github.event.issue.number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  ai-review:
    name: AI Review
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'ai-review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Issue Operations (AI Review)
        uses: ./.github/actions/issue-operations
        with:
          action: 'ai-review'
          issue_number: ${{ github.event.inputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          google_jules_api_key: ${{ secrets.GOOGLE_JULES_API_KEY }}

  resolve-conflicts:
    name: Resolve PR Conflicts
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'resolve-conflicts'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/arii/tech-dancer:v2.0.1
    steps:
      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Issue Operations (Resolve Conflicts)
        uses: ./.github/actions/issue-operations
        with:
          action: 'resolve-conflicts'
          issue_number: ${{ github.event.inputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  update-snapshots:
    name: Update Playwright Snapshots
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'update-snapshots'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Issue Operations (Update Snapshots)
        uses: ./.github/actions/issue-operations
        with:
          action: 'update-snapshots'
          issue_number: ${{ github.event.inputs.issue_number }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
