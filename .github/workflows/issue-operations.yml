name: Issue Operations

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - ai-review
          - resolve-conflicts
          - update-snapshots
      issue_number:
        description: 'Issue or PR number'
        required: true
        type: string
      comment_body:
        description: 'Comment body (optional)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  validate-quality:
    name: Validate Issue Quality
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 1

      - name: Generate Token
        id: generate_token
        uses: ./.github/actions/generate-token
        with:
          app_id: ${{ secrets.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize and Validate Inputs
        id: sanitize
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          if [[ ! "$ISSUE_NUM" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid issue_number: must be numeric."
            exit 1
          fi
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Run Issue Operations - Validate Quality
        uses: ./.github/actions/issue-operations # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          operation: 'validate-quality'
          issue_number: ${{ steps.sanitize.outputs.issue_number }}
          github_token: ${{ steps.generate_token.outputs.token }}

  create-pr:
    name: Issue to Content PR
    if: |
      github.event_name == 'issues' &&
      startsWith(github.event.issue.title, 'Draft') &&
      contains(github.event.issue.title, ':') &&
      (github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'MEMBER' ||
       github.event.issue.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 1

      - name: Generate Token
        id: generate_token
        uses: ./.github/actions/generate-token
        with:
          app_id: ${{ secrets.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize and Validate Inputs
        id: sanitize
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          if [[ ! "$ISSUE_NUM" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid issue_number: must be numeric."
            exit 1
          fi
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Run Issue Operations - Create PR
        uses: ./.github/actions/issue-operations # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          operation: 'create-pr'
          issue_number: ${{ steps.sanitize.outputs.issue_number }}
          github_token: ${{ steps.generate_token.outputs.token }}

  ai-review:
    name: AI Review
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'ai-review'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 1

      - name: Generate Token
        id: generate_token
        uses: ./.github/actions/generate-token
        with:
          app_id: ${{ secrets.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize and Validate Inputs
        id: sanitize
        env:
          ISSUE_NUM: ${{ github.event.inputs.issue_number }}
          COMMENT: ${{ github.event.inputs.comment_body }}
        run: |
          if [[ ! "$ISSUE_NUM" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid issue_number: must be numeric."
            exit 1
          fi
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

          EOF_DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "comment_body<<$EOF_DELIM"
            printf "%s\n" "$COMMENT"
            echo "$EOF_DELIM"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Run Issue Operations - AI Review
        uses: ./.github/actions/issue-operations # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          operation: 'ai-review'
          issue_number: ${{ steps.sanitize.outputs.issue_number }}
          comment_body: ${{ steps.sanitize.outputs.comment_body }}
          github_token: ${{ steps.generate_token.outputs.token }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          google_jules_api_key: ${{ secrets.GOOGLE_JULES_API_KEY }}

  resolve-conflicts:
    name: Resolve PR Conflicts
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'resolve-conflicts'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 0

      - name: Generate Token
        id: generate_token
        uses: ./.github/actions/generate-token
        with:
          app_id: ${{ secrets.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}


      - name: Sanitize and Validate Inputs
        id: sanitize
        env:
          ISSUE_NUM: ${{ github.event.inputs.issue_number }}
          COMMENT: ${{ github.event.inputs.comment_body }}
        run: |
          if [[ ! "$ISSUE_NUM" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid issue_number: must be numeric."
            exit 1
          fi
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

          EOF_DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "comment_body<<$EOF_DELIM"
            printf "%s\n" "$COMMENT"
            echo "$EOF_DELIM"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Run Issue Operations - Resolve Conflicts
        uses: ./.github/actions/issue-operations # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          operation: 'resolve-conflicts'
          issue_number: ${{ steps.sanitize.outputs.issue_number }}
          comment_body: ${{ steps.sanitize.outputs.comment_body }}
          github_token: ${{ steps.generate_token.outputs.token }}

  update-snapshots:
    name: Update Playwright Snapshots
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'update-snapshots'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 1

      - name: Generate Token
        id: generate_token
        uses: ./.github/actions/generate-token
        with:
          app_id: ${{ secrets.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}


      - name: Sanitize and Validate Inputs
        id: sanitize
        env:
          ISSUE_NUM: ${{ github.event.inputs.issue_number }}
          COMMENT: ${{ github.event.inputs.comment_body }}
        run: |
          if [[ ! "$ISSUE_NUM" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid issue_number: must be numeric."
            exit 1
          fi
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

          EOF_DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "comment_body<<$EOF_DELIM"
            printf "%s\n" "$COMMENT"
            echo "$EOF_DELIM"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Run Issue Operations - Update Snapshots
        uses: ./.github/actions/issue-operations # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          operation: 'update-snapshots'
          issue_number: ${{ steps.sanitize.outputs.issue_number }}
          comment_body: ${{ steps.sanitize.outputs.comment_body }}
          github_token: ${{ steps.generate_token.outputs.token }}
