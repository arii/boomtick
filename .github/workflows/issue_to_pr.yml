name: Issue to Content PR

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: read


jobs:
  create-pr:
    if: startsWith(github.event.issue.title, 'Draft') && contains(github.event.issue.title, ':') && (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER' || github.event.issue.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          python-version: '3.x'

      - name: Parse Issue and Generate Markdown File
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        shell: python
        run: |
          import re
          from datetime import datetime
          import os

          body = os.environ['ISSUE_BODY']
          title = os.environ['ISSUE_TITLE']
          title = re.sub(r'^Draft[^:]*:\s*', '', title).strip()

          match = re.search(r'```markdown\n(.*?)\n```', body, re.DOTALL)
          if not match:
              print("No markdown block found in issue. Exiting.")
              exit(1)

          content = match.group(1).strip()

          # Detect content type from frontmatter
          type_match = re.search(r'^type:\s*"?(\w+)"?', content, re.MULTILINE)
          content_type = type_match.group(1) if type_match else 'post'

          # Route to the right folder
          folder_map = {
              'post': 'content/posts',
              'resource': 'content/resources',
              'study': 'content/studies',
          }
          folder = folder_map.get(content_type, 'content/posts')

          date_str = datetime.now().strftime('%Y-%m-%d')
          safe_title = re.sub(r'[^a-z0-9]+', '-', title.lower()).strip('-')
          filename = f"{folder}/{date_str}-{safe_title}.md"

          os.makedirs(folder, exist_ok=True)

          with open(filename, 'w', encoding='utf-8') as f:
              f.write(content)

          print(f"File created: {filename}")

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"NEW_FILE={filename}\n")
              f.write(f"SAFE_TITLE={safe_title}\n")

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: add content from issue #${{ github.event.issue.number }}"
          title: "Content: ${{ github.event.issue.title }}"
          body: "This PR was automatically generated from issue #${{ github.event.issue.number }}."
          branch: "content/${{ env.SAFE_TITLE }}"
          base: main
          delete-branch: true
