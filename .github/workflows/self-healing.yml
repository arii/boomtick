name: Self-Healing CI

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  repair:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Collect Failure Context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          JOBS=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" --jq '[.jobs[] | select(.conclusion=="failure") | .name] | join(", ")')
          echo "failing_jobs=$JOBS" >> "$GITHUB_OUTPUT"

          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "sha_short=$(echo "$SHA" | cut -c1-8)" >> "$GITHUB_OUTPUT"

      - name: Idempotency Check
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          EXISTING_ISSUE=$(gh issue list --label ci-failure --search "$SHA" --state open --json number --jq -r '.[0].number // empty')
          if [ -n "$EXISTING_ISSUE" ]; then
            echo "issue_exists=true" >> "$GITHUB_OUTPUT"
            echo "issue_number=$EXISTING_ISSUE" >> "$GITHUB_OUTPUT"
            echo "Found existing issue #$EXISTING_ISSUE for this SHA. Skipping creation."
          else
            echo "issue_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Issue
        if: steps.check.outputs.issue_exists == 'false'
        id: create_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "fix(ci): CI failure at ${{ steps.context.outputs.sha_short }} — ${{ steps.context.outputs.failing_jobs }}"
          BODY: |
            CI failure detected in run [${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }}).

            **Commit:** ${{ github.event.workflow_run.head_sha }}
            **Failing Jobs:** ${{ steps.context.outputs.failing_jobs }}
        run: |
          gh label create ci-failure --color FF0000 --description "CI failures" || true
          ISSUE_NUMBER=$(gh issue create --title "$TITLE" --body "$BODY" --label "ci-failure")
          echo "issue_number=$(echo "$ISSUE_NUMBER" | grep -oE '[0-9]+$')" >> "$GITHUB_OUTPUT"
