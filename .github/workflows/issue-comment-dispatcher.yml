name: Issue Comment Dispatcher

on:
  issue_comment:
    types: [created]

jobs:
  dispatch:
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: write
    steps:
      - name: Checkout repository to dispatch workflows
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 1

      - name: Setup Workspace
        uses: ./mcp/actions/setup-workspace

      - name: Check commands
        id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          AUTHOR_ASSOC: ${{ github.event.comment.author_association }}
        run: |
          # Pass COMMENT_BODY via env var to td-cli for secure parsing
          RESULT=$(td-cli gh parse-comment --author-association "$AUTHOR_ASSOC")

          # Extract actions from the JSON result and set them as outputs
          {
            echo "conflict_resolve=$(echo "$RESULT" | jq -r '.actions.conflict_resolve')"
            echo "update_snapshots=$(echo "$RESULT" | jq -r '.actions.update_snapshots')"
            echo "ai_chatops=$(echo "$RESULT" | jq -r '.actions.ai_chatops')"
            echo "jules_fix_ci=$(echo "$RESULT" | jq -r '.actions.jules_fix_ci')"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Branch Details
        if: steps.check.outputs.conflict_resolve == 'true' || steps.check.outputs.update_snapshots == 'true' || steps.check.outputs.ai_chatops == 'true' || steps.check.outputs.jules_fix_ci == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_JSON=$(gh pr view "$ISSUE_NUMBER" --json headRefName,baseRefName || echo '{}')
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName // empty')
          BASE_REF=$(echo "$PR_JSON" | jq -r '.baseRefName // "main"')
          {
            echo "HEAD_REF=$HEAD_REF"
            echo "BASE_REF=$BASE_REF"
          } >> "$GITHUB_ENV"

      - name: Trigger Conflict Resolver
        if: steps.check.outputs.conflict_resolve == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh workflow run auto-conflict-resolver.yml -f issue_number="$ISSUE_NUMBER" -f comment_body="$COMMENT_BODY" -f source_branch="$HEAD_REF" -f target_branch="$BASE_REF" || true

      - name: Trigger Update Snapshots
        if: steps.check.outputs.update_snapshots == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh workflow run update-snapshots.yml --ref "$BASE_REF" -f issue_number="$ISSUE_NUMBER" -f comment_body="$COMMENT_BODY" || true

      - name: Trigger AI ChatOps
        if: steps.check.outputs.ai_chatops == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh workflow run ai-chatops.yml --ref "$BASE_REF" -f issue_number="$ISSUE_NUMBER" -f comment_body="$COMMENT_BODY" || true

      - name: Trigger Jules Fix CI
        if: steps.check.outputs.jules_fix_ci == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh workflow run jules-fix-trigger.yml --ref "$BASE_REF" -f issue_number="$ISSUE_NUMBER" -f comment_body="$COMMENT_BODY" || true
