name: Agent Orchestrator

on:
  workflow_dispatch:
    inputs:
      task_type:
        description: 'Task type to execute'
        required: true
        type: choice
        options:
          - audit
          - repair
          - dependabot
      audit_type:
        description: 'Type of Audit to run (for audit task)'
        required: false
        default: 'codebase-integrity-audit'
        type: choice
        options:
          - codebase-integrity-audit
          - issue-audit
          - review-ux
          - review-pr
          - review-all-prs
      execution_mode:
        description: 'Agent execution mode (for audit task)'
        required: false
        default: 'remote-dispatch'
        type: choice
        options:
          - remote-dispatch
          - local-orchestrator
      pr_number:
        description: 'Optional PR Number for local orchestration (for audit task)'
        required: false
        type: string
      issue_number:
        description: 'Issue number for manual fix (for repair task)'
        required: false
        type: string
      comment_body:
        description: 'Comment body (for repair task)'
        required: false
        type: string
      package_name:
        description: 'Package name (for dependabot task)'
        required: false
        default: 'example-pkg'
        type: string
      ecosystem:
        description: 'Ecosystem (for dependabot task)'
        required: false
        default: 'npm'
        type: string
      severity:
        description: 'Severity (for dependabot task)'
        required: false
        default: 'high'
        type: string
      ghsa_id:
        description: 'GHSA ID (for dependabot task)'
        required: false
        default: 'GHSA-xxxx-xxxx-xxxx'
        type: string
      patched_version:
        description: 'Patched version (for dependabot task)'
        required: false
        default: '1.2.3'
        type: string
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  repository_dispatch:
    types: [audit, repair, dependabot]
  dependabot_alert:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  audit:
    name: Audit Task
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_type == 'audit') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'audit')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace

      - name: Resolve Environment
        id: resolve_env
        env:
          AUDIT_TYPE_INPUT: ${{ github.event.inputs.audit_type || github.event.client_payload.audit_type || 'codebase-integrity-audit' }}
          EXECUTION_MODE_INPUT: ${{ github.event.inputs.execution_mode || github.event.client_payload.execution_mode || 'remote-dispatch' }}
          PR_NUMBER_INPUT: ${{ github.event.inputs.pr_number || github.event.client_payload.pr_number }}
        run: |
          if [[ ! "$AUDIT_TYPE_INPUT" =~ ^[a-zA-Z0-9/._-]+$ ]]; then
            echo "Error: Invalid audit_type format."
            exit 1
          fi
          if [[ ! "$EXECUTION_MODE_INPUT" =~ ^[a-zA-Z0-9/._-]+$ ]]; then
            echo "Error: Invalid execution_mode format."
            exit 1
          fi
          if [ -n "$PR_NUMBER_INPUT" ]; then
            if [[ ! "$PR_NUMBER_INPUT" =~ ^[0-9]+$ ]]; then
              echo "Error: Invalid pr_number: must be numeric."
              exit 1
            fi
            echo "PR_NUMBER=$PR_NUMBER_INPUT" >> "$GITHUB_ENV"
          fi
          echo "AUDIT_TYPE=$AUDIT_TYPE_INPUT" >> "$GITHUB_ENV"
          echo "EXECUTION_MODE=$EXECUTION_MODE_INPUT" >> "$GITHUB_ENV"
        shell: bash

      - name: Resolve Audit Content
        if: ${{ env.EXECUTION_MODE == 'remote-dispatch' }}
        id: resolve-content
        run: |
          if [ -f ".agents/workflows/${AUDIT_TYPE}.md" ]; then
            EOF_DELIMITER=$(openssl rand -hex 16)
            {
              echo "AUDIT_PROMPT<<$EOF_DELIMITER"
              cat ".agents/workflows/${AUDIT_TYPE}.md"
              echo "$EOF_DELIMITER"
            } >> "$GITHUB_ENV"
          else
            echo "Error: Audit template not found at .agents/workflows/${AUDIT_TYPE}.md."
            false
          fi
        shell: bash

      - name: Dispatch Jules Agent
        if: ${{ env.EXECUTION_MODE == 'remote-dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          td-cli agent dispatch main "$AUDIT_PROMPT"
        shell: bash

      - name: Run Local Orchestrator
        if: ${{ env.EXECUTION_MODE == 'local-orchestrator' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number provided. Running local orchestrator for all open PRs..."
            td-cli agent run-local
          else
            echo "Running local orchestrator for PR #$PR_NUMBER..."
            td-cli agent run-local --pr "$PR_NUMBER"
          fi
        shell: bash

  repair:
    name: CI Repair Task
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_type == 'repair') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'repair')
    concurrency:
      group: ci-repair-${{ github.event.workflow_run.head_branch || github.event.inputs.issue_number || github.event.client_payload.issue_number || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Determine Mode
        id: determine_mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "mode=auto" >> "$GITHUB_OUTPUT"
          else
            echo "mode=manual" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Run CI Repair
        uses: ./.github/actions/ci-repair
        with:
          mode: ${{ steps.determine_mode.outputs.mode }}
          issue_number: ${{ github.event.inputs.issue_number || github.event.client_payload.issue_number }}
          comment_body: ${{ github.event.inputs.comment_body || github.event.client_payload.comment_body }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  dependabot:
    name: Dependabot Alert Handler Task
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task_type == 'dependabot') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'dependabot') ||
      (github.event_name == 'dependabot_alert')
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Workspace
        uses: ./mcp/actions/setup-workspace
        with:
          setup-python: 'true'

      - name: Generate Issue Body
        id: generate_body
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PACKAGE_NAME: ${{ github.event.inputs.package_name || github.event.client_payload.package_name }}
          INPUT_ECOSYSTEM: ${{ github.event.inputs.ecosystem || github.event.client_payload.ecosystem }}
          INPUT_SEVERITY: ${{ github.event.inputs.severity || github.event.client_payload.severity }}
          INPUT_GHSA_ID: ${{ github.event.inputs.ghsa_id || github.event.client_payload.ghsa_id }}
          INPUT_PATCHED_VERSION: ${{ github.event.inputs.patched_version || github.event.client_payload.patched_version }}
          ALERT_PACKAGE_NAME: ${{ github.event.alert.security_vulnerability.package.name }}
          ALERT_ECOSYSTEM: ${{ github.event.alert.security_vulnerability.package.ecosystem }}
          ALERT_SEVERITY: ${{ github.event.alert.security_advisory.severity }}
          ALERT_GHSA_ID: ${{ github.event.alert.security_advisory.ghsa_id }}
          ALERT_PATCHED_VERSION: ${{ github.event.alert.security_vulnerability.first_patched_version.identifier }}
        run: |
          set -eo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$EVENT_NAME" = "repository_dispatch" ]; then
            PACKAGE="$INPUT_PACKAGE_NAME"
            ECOSYSTEM="$INPUT_ECOSYSTEM"
            SEVERITY="$INPUT_SEVERITY"
            GHSA_ID="$INPUT_GHSA_ID"
            PATCHED_VERSION="$INPUT_PATCHED_VERSION"
          else
            PACKAGE="$ALERT_PACKAGE_NAME"
            ECOSYSTEM="$ALERT_ECOSYSTEM"
            SEVERITY="$ALERT_SEVERITY"
            GHSA_ID="$ALERT_GHSA_ID"
            PATCHED_VERSION="$ALERT_PATCHED_VERSION"
          fi

          if [ -z "$PATCHED_VERSION" ] || [ "$PATCHED_VERSION" = "null" ]; then
            PATCHED_VERSION="the latest secure version"
          fi

          export PACKAGE ECOSYSTEM SEVERITY GHSA_ID PATCHED_VERSION
          python3 - <<'PYTHON_EOF'
          import os
          import re
          import textwrap

          def escape_md(text):
              """Escapes problematic markdown special characters and prevents mentions."""
              if not text:
                  return ""
              text = re.sub(r"([`@#\[])", r"\\\1", text)
              return text

          package = os.environ.get("PACKAGE", "unknown")
          ecosystem = os.environ.get("ECOSYSTEM", "unknown")
          severity = os.environ.get("SEVERITY", "unknown")
          ghsa_id = os.environ.get("GHSA_ID", "unknown")
          patched_version = os.environ.get("PATCHED_VERSION", "the latest version")

          s_package = escape_md(package)
          s_ecosystem = escape_md(ecosystem)
          s_severity = escape_md(severity)
          s_ghsa_id = escape_md(ghsa_id)
          s_patched_version = escape_md(patched_version)

          title = f"security: upgrade {package} to {patched_version} ({ghsa_id})"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"title={title}\n")

          body = textwrap.dedent(f"""
          ## Problem Statement

          A {s_severity} severity vulnerability ({s_ghsa_id}) has been detected in the {s_package} package ({s_ecosystem} ecosystem).

          ## Goal

          Upgrade {s_package} to version {s_patched_version} to resolve the security vulnerability.

          ## Non-Goals

          - Making unrelated dependency upgrades.
          - Modifying application logic beyond what is necessary for the upgrade.

          ---

          ## Proposed Approach

          Upgrade {s_package} to at least version {s_patched_version} using the appropriate package manager commands for {s_ecosystem}.

          ### Alternatives Considered

          | Approach | Rejected because |
          |---|---|
          | Manual lockfile editing | Prone to errors and inconsistent with package manager resolution. |
          | Ignoring the alert | Security risk; the vulnerability must be addressed. |

          ### Architectural Impact

          - [ ] Introduces a new dependency
          - [ ] Changes a shared type/interface used elsewhere
          - [ ] Touches core/shared service code (not feature-local)
          - [ ] Requires a data/schema/storage migration
          - [x] None of the above — fully isolated change

          ---

          ## Scope

          ### Files expected to change

          1. Package manifest (e.g., `package.json`, `requirements.txt`, `etl/requirements.txt`)
          2. Lockfile (e.g., `pnpm-lock.yaml`)

          ## UNDERSTAND THE ISSUE

          Restate the problem in your own words:
          A security vulnerability {s_ghsa_id} was found in {s_package}. We need to upgrade to {s_patched_version} to mitigate this.

          State the underlying GOAL:
          Mitigate security risk by upgrading {s_package}.

          Flag any ambiguity in the issue as written:
          None.

          ## DETERMINE APPROACH

          Propose the most likely correct solution approach:
          Run the upgrade command for {s_ecosystem}. For example, `pnpm update {s_package}@{s_patched_version}`.

          Identify at least one alternative approach and state why it was rejected:
          Ignoring it - rejected due to security policy.

          Call out any architectural decisions this approach forces:
          None.

          Flag if the approach touches shared/core code used by multiple features:
          Yes, dependencies are shared across the project.

          ## SPECIFY SCOPE

          IN SCOPE:
          [Upgrading {s_package} to {s_patched_version}, Updating lockfiles]

          OUT OF SCOPE:
          [Unrelated upgrades]

          Flag if achieving the goal is impossible without violating the out-of-scope boundary:
          No.

          ## DEFINITION OF DONE

          List concrete, verifiable completion criteria:

          - [ ] {s_package} is at version {s_patched_version} or higher.
          - [ ] All CI tests pass.
          - [ ] Dependabot alert {s_ghsa_id} is resolved/dismissed.

          State what must be manually verified vs. what can be automated:
          Automated via CI.

          State explicitly what is NOT required for this issue to be considered done:
          Manual QA of unrelated features.
          """).strip()

          with open("issue_body.md", "w") as f:
              f.write(body)
          PYTHON_EOF
        shell: bash

      - name: Create Issue
        id: create_issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ steps.generate_body.outputs.title }}
        run: |
          set -eo pipefail
          ISSUE_URL=$(gh issue create \
            --title "$ISSUE_TITLE" \
            --body-file issue_body.md \
            --label "spec-driven,security" \
            --assignee Jules)

          echo "issue_url=${ISSUE_URL}" >> "$GITHUB_OUTPUT"

          # shellcheck disable=SC2155
          issue_number="${ISSUE_URL##*/}"
          echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Dispatch Jules
        if: steps.create_issue.outputs.issue_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.issue_number }}
        run: |
          set -eo pipefail
          td-cli jules dispatch main "Upgrade dependency to fix security vulnerability in issue #$ISSUE_NUMBER"
        shell: bash
