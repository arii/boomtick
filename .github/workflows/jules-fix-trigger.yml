name: Jules Fix CI

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: string
      comment_body:
        description: 'Comment body'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read


jobs:
  trigger-jules:

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install PyGithub requests click

      - name: Pre-check Jules Credentials
        run: |
          MISSING=()
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then MISSING+=("GITHUB_TOKEN"); fi
          if [ -z "${{ secrets.JULES_API_KEY }}" ]; then MISSING+=("JULES_API_KEY"); fi

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "❌ Missing required secrets: ${MISSING[*]}"
            echo "Please ensure GITHUB_TOKEN and JULES_API_KEY are configured in repository secrets."
            exit 1
          fi

          if [ -z "${{ vars.JULES_SOURCE_ID }}" ]; then
            echo "⚠️ JULES_SOURCE_ID variable not found. Script will attempt auto-discovery."
          fi
          echo "✅ Credentials pre-check passed."

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace
        with:
          setup-node: 'false'

      - name: Initialize Jules Repair Session
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          JULES_SOURCE_ID: ${{ vars.JULES_SOURCE_ID }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          # Capture both stdout and stderr for better diagnostic visibility
          td-cli jules fix-ci --pr-number "$ISSUE_NUMBER" --execute 2>&1
