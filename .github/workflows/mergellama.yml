name: Auto-Resolve Merge Conflicts

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'PR number to resolve'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true



jobs:
  resolve-conflicts:
    runs-on: ubuntu-latest
    container: ghcr.io/arii/tech-dancer:latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.mergeable == false ||
      contains(github.event.pull_request.labels.*.name, 'has-conflicts')
    env:
      AI_MODEL: gpt-4o-mini
      GITHUB_MODELS_BASE_URL: https://models.inference.ai.azure.com
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve PR Details
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number || github.event.pull_request.number }}
        run: |
          PR_JSON=$(gh pr view "$ISSUE_NUMBER" --json headRefName,headRepository || echo '{}')
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName // empty')
          HEAD_REPO=$(echo "$PR_JSON" | jq -r '.headRepository.fullName // empty')

          if [ -z "$HEAD_REF" ]; then
            echo "❌ Could not resolve PR details for #$ISSUE_NUMBER"
            exit 1
          fi

          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "head_repo=$HEAD_REPO" >> "$GITHUB_OUTPUT"

      - name: Checkout Code
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          repository: ${{ steps.resolve.outputs.head_repo }}
          fetch-depth: 1
          ref: ${{ steps.resolve.outputs.head_ref }}

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace

      - name: Check active runtime
        run: |
          node scripts/check-runtime-files.mjs
          node scripts/check-runtime.mjs

      - name: Find and Resolve Conflicts
        run: |
          # Use our unified CLI for resolution
          td-cli gh resolve

      - name: Validate Resolution
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @arii/boomtick-mcp run sync-contracts
          pnpm run type-check

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          commit_message: "chore: auto-resolved merge conflicts using AI"
          file_pattern: '.'
