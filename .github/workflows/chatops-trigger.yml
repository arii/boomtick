name: ChatOps Trigger

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write

jobs:
  dispatch:
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Workspace
        uses: ./.github/actions/setup-all

      - name: Check commands
        id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          AUTHOR_ASSOC: ${{ github.event.comment.author_association }}
        run: |
          RESULT=$(td-cli gh parse-comment --author-association "$AUTHOR_ASSOC")
          {
            echo "conflict_resolve=$(echo "$RESULT" | jq -r '.actions.conflict_resolve')"
            echo "update_snapshots=$(echo "$RESULT" | jq -r '.actions.update_snapshots')"
            echo "ai_chatops=$(echo "$RESULT" | jq -r '.actions.ai_chatops')"
            echo "jules_fix_ci=$(echo "$RESULT" | jq -r '.actions.jules_fix_ci')"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Branch Details
        if: steps.check.outputs.conflict_resolve == 'true' || steps.check.outputs.update_snapshots == 'true' || steps.check.outputs.ai_chatops == 'true' || steps.check.outputs.jules_fix_ci == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_JSON=$(gh pr view "$ISSUE_NUMBER" --json headRefName,baseRefName || echo '{}')
          {
            echo "HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName // empty')"
            echo "BASE_REF=$(echo "$PR_JSON" | jq -r '.baseRefName // "main"')"
          } >> "$GITHUB_ENV"

      - name: Trigger Conflict Resolver
        if: steps.check.outputs.conflict_resolve == 'true'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh workflow run issue-operations.yml --ref "$HEAD_REF" -f action="resolve-conflicts" -f issue_number="$ISSUE_NUMBER" -f comment_body="$COMMENT_BODY" || true

      - name: Trigger Update Snapshots
        if: steps.check.outputs.update_snapshots == 'true'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh workflow run issue-operations.yml --ref "$HEAD_REF" -f action="update-snapshots" -f issue_number="$ISSUE_NUMBER" -f comment_body="$COMMENT_BODY" || true

      - name: Trigger AI ChatOps
        if: steps.check.outputs.ai_chatops == 'true'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh workflow run issue-operations.yml --ref "$HEAD_REF" -f action="ai-review" -f issue_number="$ISSUE_NUMBER" -f comment_body="$COMMENT_BODY" || true

      - name: Trigger Jules Fix CI
        if: steps.check.outputs.jules_fix_ci == 'true'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Dispatch to the consolidated manual fix entry point in ci-repair.yml
          gh workflow run ci-repair.yml --ref "$BASE_REF" -f issue_number="$ISSUE_NUMBER" -f comment_body="$COMMENT_BODY" || true
