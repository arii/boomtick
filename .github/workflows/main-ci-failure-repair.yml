name: Main Branch CI Failure Repair

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  issues: write
  actions: read
  pull-requests: write

jobs:
  repair:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 0

      - name: Setup Workspace
        uses: ./boomtick-pkg/mcp/actions/setup-workspace
        with:
          setup-node: 'false'

      - name: Collect Failure Context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          JOBS=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" --jq '[.jobs[] | select(.conclusion=="failure") | .name] | join(", ")')
          echo "failing_jobs=$JOBS" >> "$GITHUB_OUTPUT"

          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "sha_short=$(echo "$SHA" | cut -c1-8)" >> "$GITHUB_OUTPUT"

      - name: Idempotency Check
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          EXISTING_ISSUE=$(gh issue list --label main-ci-failure --search "$SHA" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_ISSUE" ]; then
            echo "issue_exists=true" >> "$GITHUB_OUTPUT"
            echo "issue_number=$EXISTING_ISSUE" >> "$GITHUB_OUTPUT"
            echo "Found existing issue #$EXISTING_ISSUE for this SHA. Skipping creation."
          else
            echo "issue_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Issue
        if: steps.check.outputs.issue_exists == 'false'
        id: create_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: "fix(ci): main branch failure at ${{ steps.context.outputs.sha_short }} — ${{ steps.context.outputs.failing_jobs }}"
          BODY: |
            Main branch CI failure detected in run [${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }}).

            **Commit:** ${{ github.event.workflow_run.head_sha }}
            **Failing Jobs:** ${{ steps.context.outputs.failing_jobs }}

            🤖 Jules repair session will be dispatched automatically.
        run: |
          gh label create main-ci-failure --color FF0000 --description "CI failures on main branch" || true
          ISSUE_NUMBER=$(gh issue create --title "$TITLE" --body "$BODY" --label "main-ci-failure,spec-driven")
          echo "issue_number=$(echo "$ISSUE_NUMBER" | grep -oE '[0-9]+$')" >> "$GITHUB_OUTPUT"

      - name: Dispatch Jules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          ISSUE_NUMBER: ${{ steps.check.outputs.issue_number || steps.create_issue.outputs.issue_number }}
        run: |
          if [ -z "$JULES_API_KEY" ]; then
            echo "::warning::JULES_API_KEY is missing. Jules repair session cannot be dispatched."
            gh issue comment "$ISSUE_NUMBER" --body "⚠️ JULES_API_KEY is missing. Jules repair session cannot be dispatched."
            exit 0
          fi

          # Use td-cli to dispatch Jules
          td-cli jules fix-ci --issue-number "$ISSUE_NUMBER" --execute
