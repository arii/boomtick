name: Release Drafter

on:
  push:
    branches:
      - main
  # Note: pull_request trigger is disabled until .github/release-drafter.yml is merged into the default branch.
  # Release Drafter requires the config file to exist in the default branch to process PR events.
  # pull_request:
  #   types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - name: Draft Release
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
