name: CI Repair

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number for manual fix'
        required: false
        type: string
      comment_body:
        description: 'Comment body'
        required: false
        type: string

concurrency:
  # Group executions by head branch to serialize runs and prevent concurrent write race conditions.
  group: ci-repair-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  repair:
    name: Automated CI Repair
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run CI Repair Action (Automated)
        uses: ./.github/actions/ci-repair
        with:
          run_id: ${{ github.event.workflow_run.id }}
          run_url: ${{ github.event.workflow_run.html_url }}
          head_sha: ${{ github.event.workflow_run.head_sha }}
          head_branch: ${{ github.event.workflow_run.head_branch }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}

  manual-jules-fix:
    name: Manual Jules Fix CI
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run CI Repair Action (Manual)
        uses: ./.github/actions/ci-repair
        with:
          issue_number: ${{ github.event.inputs.issue_number }}
          comment_body: ${{ github.event.inputs.comment_body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          jules_source_id: ${{ vars.JULES_SOURCE_ID }}
