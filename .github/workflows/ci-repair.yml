name: CI Repair

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number for manual fix'
        required: false
        type: string
      comment_body:
        description: 'Comment body'
        required: false
        type: string

concurrency:
  # Group executions by head branch to serialize runs and prevent concurrent write race conditions.
  group: ci-repair-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

env:
  APP_ID: ${{ secrets.APP_ID }}
  APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

jobs:
  repair:
    name: Automated CI Repair
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 1

      - name: Generate Token
        id: generate_token
        uses: ./.github/actions/generate-token
        with:
          app_id: ${{ env.APP_ID }}
          app_private_key: ${{ env.APP_PRIVATE_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI Repair
        uses: ./.github/actions/ci-repair # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          mode: 'auto'
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          github_token: ${{ steps.generate_token.outputs.token }}

  manual-jules-fix:
    name: Manual Jules Fix CI
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          fetch-depth: 1

      - name: Generate Token
        id: generate_token
        uses: ./.github/actions/generate-token
        with:
          app_id: ${{ env.APP_ID }}
          app_private_key: ${{ env.APP_PRIVATE_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Manual CI Repair
        uses: ./.github/actions/ci-repair # nosemgrep: yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
        with:
          mode: 'manual'
          issue_number: ${{ github.event.inputs.issue_number }}
          comment_body: ${{ github.event.inputs.comment_body }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          github_token: ${{ steps.generate_token.outputs.token }}
