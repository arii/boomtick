name: BoomTick Anti-Pattern Audit
description: Runs UI anti-pattern and design token compliance audits
inputs:
  github_token:
    description: 'GitHub token'
    required: true
runs:
  using: composite
  steps:
    - uses: ./mcp/actions/setup

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --prefer-offline
      shell: bash

    - name: UI Anti-Pattern Audit - Gate
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        echo "::group::Audit"
        trap 'echo "::endgroup::"' EXIT
        export PATH="$HOME/.local/bin:/github/home/.local/bin:$PATH"

        # Search for audit script: 1. Local, 2. Action-bundled
        if [ -f "scripts/detect-antipatterns.mjs" ]; then
          AUDIT_SCRIPT="scripts/detect-antipatterns.mjs"
        elif [ -f "${{ github.action_path }}/../../../scripts/detect-antipatterns.mjs" ]; then
          AUDIT_SCRIPT="${{ github.action_path }}/../../../scripts/detect-antipatterns.mjs"
        else
          echo "::error::Audit script not found"
          exit 1
        fi

        if ! node "$AUDIT_SCRIPT"; then echo "Audit failed"; exit 1; fi
        python3 -m dev_tools.cli gh audit-gate
      shell: bash

    - name: Design Token Compliance
      run: |
        VIOLATIONS=$(find . -name "*.tsx" -not -path "*/node_modules/*" -type f | xargs grep -h '#[0-9a-fA-F]\{3,6\}' \
          | grep -vc "design-tokens\|tokens.css\|// impeccable-ignore" || echo 0)
        if [ "$VIOLATIONS" -gt 0 ]; then
          echo "⚠️ Found $VIOLATIONS raw hex color(s) in tsx files. Use CSS variables instead."
          find . -name "*.tsx" -not -path "*/node_modules/*" -type f | xargs grep -rn '#[0-9a-fA-F]\{3,6\}' | grep -v "design-tokens\|tokens.css"
          exit 1
        fi
        echo "✅ Design token compliance passed."
      shell: bash
