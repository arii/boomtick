name: BoomTick Lint & Typecheck
description: Runs linting and typechecking via project gate
inputs:
  target:
    description: 'Target to check (root or boomtick-mcp)'
    required: true
  github_token:
    description: 'GitHub token'
    required: true
runs:
  using: composite
  steps:
    - uses: ./mcp/actions/setup

    - name: Run Project Gate
      uses: ./mcp/actions/run-project-gate
      with:
        target: ${{ inputs.target }}
        github_token: ${{ inputs.github_token }}
