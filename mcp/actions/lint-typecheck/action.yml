name: BoomTick Lint & Typecheck
description: Runs linting and typechecking via project gate
inputs:
  target:
    description: 'Target to check (root or boomtick-mcp)'
    required: true
  github_token:
    description: 'GitHub token'
    required: true
runs:
  using: composite
  steps:
    - uses: arii/boomtick/mcp/actions/setup@actions-v1

    - name: Run Project Gate
      uses: arii/boomtick/mcp/actions/run-project-gate@actions-v1
      with:
        target: ${{ inputs.target }}
        github_token: ${{ inputs.github_token }}
