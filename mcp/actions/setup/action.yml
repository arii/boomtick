name: BoomTick Setup
description: Comprehensive setup including checkout, node/pnpm, workspace, and MCP build
runs:
  using: composite
  steps:
    - name: Configure Git Safe Directory
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      shell: bash

    - name: Setup Workspace
      uses: ./.github/actions/setup-workspace

    - name: Verify setup
      run: td doctor
      shell: bash
